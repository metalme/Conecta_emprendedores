<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Emprendedores</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
.formulario, .form-container { background: white; padding: 20px; border-radius: 8px; width: 80%; margin: 20px auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
input { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; width: 15%; }
table { border-collapse: collapse; width: 90%; margin: 20px auto; background: white; }
th, td { border: 1px solid #ccc; padding: 12px; }
th { background: #2c3e50; color: white; }
.btn-borrar { background: #e74c3c; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
.btn-update { background: #27ae60; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
</style>
</head>
<body>

<h1>Emprendedores Registrados</h1>

<div class="formulario">
<h2>Registrar Nuevo</h2>
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="documento" placeholder="Documento">
<input type="email" id="correo" placeholder="Correo">
<input type="number" id="telefono" placeholder="Teléfono">
<input type="text" id="password" placeholder="password">

<button onclick="guardar()">Guardar</button>
</div>

<table id="tabla">
<thead>
<tr><th>ID</th><th>Documento</th><th>Nombre</th><th>Correo</th><th>Teléfono</th><th>Password</th><th>Acciones</th></tr>
</thead>
<tbody></tbody>
</table>

<div class="form-container">
<h3>Consultar y Editar por ID</h3>
<input type="number" id="id_busqueda" placeholder="Ingrese ID">
<button onclick="consultarPorId()">Buscar</button>
<hr>
<div id="areaEdicion" style="display:none; text-align: left; max-width: 400px; margin: auto;">
<label>Nombre:</label> <input type="text" id="nombre_edit" style="width:80%"><br>
<label>Documento:</label> <input type="text" id="documento_edit" style="width:80%"><br>
<label>Correo:</label> <input type="email" id="correo_edit" style="width:80%"><br>
<label>Teléfono:</label> <input type="text" id="telefono_edit" style="width:80%"><br>
<label>Password:</label> <input type="text" id="password_edit" style="width:80%"><br>
<button class="btn-update" onclick="actualizarRegistro()">Guardar Cambios</button>
</div>
<p id="feedback"></p>
</div>

<script>
const API_URL = "http://localhost:3000/emprendedores";

// CARGAR TABLA
const cargar = () => {
fetch(API_URL)
.then(res => res.json())
.then(data => {
const tbody = document.querySelector("#tabla tbody");
tbody.innerHTML = data.map(emp => `
<tr>
<td>${emp.id_emprendedor}</td>
<td>${emp.nombre}</td>
<td>${emp.documento}</td>
<td>${emp.correo}</td>
<td>${emp.telefono}</td>
<td>${emp.password}</td>
<td><button class="btn-borrar" onclick="eliminar(${emp.id_emprendedor})">Eliminar</button></td>
</tr>
`).join('');
});
};

// GUARDAR NUEVO
const guardar = () => {
const datos = {
nombre: document.getElementById("nombre").value,
documento: document.getElementById("documento").value,
correo: document.getElementById("correo").value,
telefono: document.getElementById("telefono").value,
password: document.getElementById("password").value
};
fetch(API_URL, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(datos)
}).then(() => { alert("Guardado"); cargar(); });
};

// CONSULTAR POR ID (CORREGIDO)
async function consultarPorId() {
const id = document.getElementById('id_busqueda').value;
const res = await fetch(`${API_URL}/${id}`);
const data = await res.json();

if(data && data.id_emprendedor) {
document.getElementById('nombre_edit').value = data.nombre;
document.getElementById('documento_edit').value = data.documento;
document.getElementById('correo_edit').value = data.correo;
document.getElementById('telefono_edit').value = data.telefono;
document.getElementById('password_edit').value = data.password;
document.getElementById('areaEdicion').style.display = 'block';
document.getElementById('feedback').innerText = "";
} else {
alert("ID no encontrado");
}
}

// ACTUALIZAR (CORREGIDO)
async function actualizarRegistro() {
const id = document.getElementById('id_busqueda').value;
const datos = {
nombre: document.getElementById('nombre_edit').value,
documento: document.getElementById('documento_edit').value,
correo: document.getElementById('correo_edit').value,
telefono: document.getElementById('telefono_edit').value,
password: document.getElementById('password_edit').value
};
await fetch(`${API_URL}/${id}`, {
method: 'PUT',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(datos)
});
alert("Actualizado");
cargar();
}

// ELIMINAR
const eliminar = (id) => {
if(confirm("¿Eliminar?")) {
fetch(`${API_URL}/${id}`, { method: 'DELETE' }).then(() => cargar());
}
};

cargar();
</script>
</body>
</html>
