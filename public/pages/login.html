<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Conecta Emprendedores</title>
    <link rel="stylesheet" href="../css/estilos_login.css">
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <nav id="sidebar" class="sidebar">
        <ul>
            <li><a href="Inicio.html">Inicio</a></li>
            <li><a href="emprendedores.html">Emprendedores</a></li>
            <li><a href="inversores.html">Inversores</a></li>
            <li><a href="recursos.html">Recursos</a></li>
            <li><a href="sobre_nosotros.html">Sobre Nosotros</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <section class="hero">
        <img src="../assets/img/foto 1.webp" alt="Fondo" class="hero-img">
    </section>

    <div class="login-card">
        <img src="../assets/img/logo.png" alt="Logo Conecta" class="login-logo">
        <h2>Iniciar Sesión</h2>
        <form id="login_formulario">
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Acceder</button>
        </form>
        <p class="register-link">
            ¿No tienes cuenta? <br> 
            <a href="registro.html">Regístrate aquí</a>
        </p>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
        }
    </script>
    <script src="../js/login_enlace.js"></script>
</body>
</html>
